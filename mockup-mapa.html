<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mockup · Mapa EUA + rota</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--ink:#26282B;--muted:#8E939C;--paper:#fff;--bg:#FAFBFC;--border:#E6E9EE;--land:#EEF1F5}
  body.dark{--ink:#E9EBEF;--muted:#7A7F88;--paper:#15171C;--bg:#0F1013;--border:#2A2D33;--land:#1D2026}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;padding:36px 20px;transition:.3s}
  .top{display:flex;justify-content:space-between;align-items:center;max-width:900px;margin:0 auto 24px}
  .top h1{font-size:1.05rem;font-weight:700}
  .toggle{border:1px solid var(--border);background:var(--paper);color:var(--ink);border-radius:999px;padding:8px 16px;font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;cursor:pointer}
  .card{max-width:900px;margin:0 auto;background:var(--paper);border:1px solid var(--border);border-radius:22px;padding:36px 30px;position:relative}
  .vlabel{font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:18px}
  .replay{position:absolute;top:14px;right:16px;border:1px solid var(--border);background:transparent;color:var(--muted);border-radius:999px;padding:5px 12px;font-family:'JetBrains Mono',monospace;font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer}
  svg{display:block;width:100%;height:auto;overflow:visible}

  .land{fill:var(--land);stroke:var(--border);stroke-width:.4;stroke-linejoin:round}
  .route{fill:none;stroke:var(--ink);stroke-width:.9;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:1;stroke-dashoffset:1}
  .run .route{animation:draw 3.4s cubic-bezier(.5,0,.2,1) forwards}
  @keyframes draw{to{stroke-dashoffset:0}}
  .dot{fill:var(--paper);stroke:var(--ink);stroke-width:.8}
  .dot.hl{fill:var(--ink)}
  .halo{fill:none;stroke:var(--ink);stroke-width:.4;opacity:0}
  .run .halo{animation:halo 2s ease-out infinite}
  @keyframes halo{0%{opacity:.5;r:1.8}100%{opacity:0;r:5}}
  .pin{opacity:0}
  .run .pin{animation:pin .5s cubic-bezier(.2,.8,.2,1) forwards}
  .run .pin:nth-of-type(1){animation-delay:.6s}.run .pin:nth-of-type(2){animation-delay:1.1s}
  .run .pin:nth-of-type(3){animation-delay:1.6s}.run .pin:nth-of-type(4){animation-delay:2.1s}
  .run .pin:nth-of-type(5){animation-delay:2.6s}.run .pin:nth-of-type(6){animation-delay:3.1s}
  @keyframes pin{from{opacity:0;transform:translateY(2px)}to{opacity:1;transform:none}}
  .code{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:4px;fill:var(--ink)}
  .idx{font-family:'JetBrains Mono',monospace;font-size:2.6px;fill:var(--muted)}
  .tick{stroke:var(--muted);stroke-width:.35}
  body.dark .land{fill:var(--land);stroke:var(--border)} body.dark .route,body.dark .halo{stroke:var(--paper)}
  body.dark .dot{stroke:var(--paper)} body.dark .dot.hl{fill:var(--paper)} body.dark .code{fill:var(--paper)}
</style>
</head>
<body>
  <div class="top"><h1>Mapa EUA + conectar os pontos</h1><button class="toggle" id="toggle">🌙 / ☀️ tema</button></div>
  <div class="card">
    <div class="vlabel">contorno real (projetado por coordenadas) + rota desenhando</div>
    <button class="replay" id="replay">↻ replay</button>
    <div id="map"></div>
  </div>

<script>
  // contorno continental EUA — coarse (lon,lat) sentido horário
  var US=[
    [-124.6,48.3],[-124.0,46.2],[-124.1,43.3],[-124.2,40.4],[-122.4,37.8],[-120.6,34.4],[-117.3,32.5],
    [-114.7,32.7],[-111.0,31.3],[-108.2,31.3],[-106.5,31.8],[-104.5,29.5],[-102.5,29.8],[-99.5,27.5],[-97.4,25.9],
    [-95.0,28.8],[-93.8,29.7],[-91.5,29.3],[-90.0,29.2],[-88.4,30.3],[-86.5,30.4],[-84.3,30.0],[-83.0,29.2],
    [-82.8,27.8],[-81.8,26.0],[-80.9,25.2],[-80.1,26.8],[-80.6,28.4],[-81.4,30.7],
    [-80.9,32.0],[-79.2,33.4],[-77.9,34.2],[-75.5,35.2],[-76.0,36.9],[-75.1,38.4],[-74.2,39.6],[-74.0,40.5],
    [-71.9,41.3],[-70.7,41.6],[-70.8,42.5],[-70.2,43.7],[-67.8,44.8],[-67.0,47.1],
    [-69.2,47.4],[-71.5,45.0],[-74.7,45.0],[-76.9,43.6],[-79.2,43.3],[-81.3,42.2],[-83.1,42.0],
    [-82.5,45.0],[-84.7,45.8],[-87.8,46.0],[-90.4,46.7],[-92.3,46.7],[-95.2,49.0],
    [-104.0,49.0],[-110.0,49.0],[-117.0,49.0],[-122.8,49.0],[-124.6,48.3]
  ];
  var CITIES=[
    {n:'DC',  i:'01',lon:-77.04,lat:38.90,dx:5,dy:1},
    {n:'NYC', i:'02',lon:-74.0, lat:40.71,dx:5,dy:0,hl:1},
    {n:'BOS', i:'03',lon:-71.06,lat:42.36,dx:5,dy:-1},
    {n:'LAS', i:'04',lon:-115.14,lat:36.17,dx:-5,dy:-2,hl:1,anchor:'end'},
    {n:'MCO', i:'05',lon:-81.38,lat:28.54,dx:-6,dy:1,anchor:'end'},
    {n:'MIA', i:'06',lon:-80.19,lat:25.76,dx:5,dy:2.5}
  ];
  var W=210;
  var lons=US.concat(CITIES.map(function(c){return[c.lon,c.lat];})).map(function(p){return p[0];});
  var lats=US.concat(CITIES.map(function(c){return[c.lon,c.lat];})).map(function(p){return p[1];});
  var lon0=Math.min.apply(0,lons),lon1=Math.max.apply(0,lons),la0=Math.min.apply(0,lats),la1=Math.max.apply(0,lats);
  var kx=Math.cos((la0+la1)/2*Math.PI/180);
  var s=W/((lon1-lon0)*kx), H=(la1-la0)*s;
  function P(lon,lat){return[((lon-lon0)*kx*s),((la1-lat)*s)];}
  function pp(lon,lat){var p=P(lon,lat);return p[0].toFixed(1)+' '+p[1].toFixed(1);}

  function build(){
    var land='M '+US.map(function(p){return pp(p[0],p[1]);}).join(' L ')+' Z';
    var route='M '+CITIES.map(function(c){return pp(c.lon,c.lat);}).join(' L ');
    var pins=CITIES.map(function(c){
      var p=P(c.lon,c.lat),lx=p[0]+c.dx,ly=p[1]+c.dy;
      return (c.hl?'<circle class="halo" cx="'+p[0].toFixed(1)+'" cy="'+p[1].toFixed(1)+'" r="1.8"/>':'')+
        '<circle class="dot'+(c.hl?' hl':'')+'" cx="'+p[0].toFixed(1)+'" cy="'+p[1].toFixed(1)+'" r="1.8"/>'+
        '<g class="pin">'+
        '<line class="tick" x1="'+p[0].toFixed(1)+'" y1="'+p[1].toFixed(1)+'" x2="'+(lx+(c.dx<0?1:-1)).toFixed(1)+'" y2="'+(ly-1).toFixed(1)+'"/>'+
        '<text class="code" x="'+lx.toFixed(1)+'" y="'+ly.toFixed(1)+'"'+(c.anchor?' text-anchor="end"':'')+'>'+c.n+'</text>'+
        '<text class="idx" x="'+lx.toFixed(1)+'" y="'+(ly+3.6).toFixed(1)+'"'+(c.anchor?' text-anchor="end"':'')+'>'+c.i+'</text>'+
        '</g>';
    }).join('');
    document.getElementById('map').innerHTML='<svg viewBox="0 0 '+W.toFixed(0)+' '+H.toFixed(0)+'">'+
      '<path class="land" d="'+land+'"/>'+
      '<path class="route" d="'+route+'" pathLength="1"/>'+pins+'</svg>';
  }
  function play(){build();var m=document.getElementById('map');m.classList.remove('run');void m.offsetWidth;m.classList.add('run');}
  play();
  document.getElementById('replay').addEventListener('click',play);
  document.getElementById('toggle').addEventListener('click',function(){document.body.classList.toggle('dark');});
</script>
</body>
</html>
