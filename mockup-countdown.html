<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mockup · Countdown reveal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--ink:#26282B;--ink-muted:#8E939C;--paper:#fff;--bg:#FAFBFC;--border:#E6E9EE;--stroke:var(--ink)}
  body.dark{--ink:#E9EBEF;--ink-muted:#7A7F88;--paper:#15171C;--bg:#0F1013;--border:#2A2D33;--stroke:var(--paper)}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;padding:40px 24px;transition:.3s}
  .top{display:flex;justify-content:space-between;align-items:center;max-width:880px;margin:0 auto 32px}
  .top h1{font-size:1.05rem;font-weight:700}
  .toggle{border:1px solid var(--border);background:var(--paper);color:var(--ink);border-radius:999px;padding:8px 16px;font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;cursor:pointer}
  .card{max-width:880px;margin:0 auto 24px;background:var(--paper);border:1px solid var(--border);border-radius:20px;padding:54px 32px;text-align:center;position:relative;overflow:hidden}
  .vlabel{position:absolute;top:16px;left:20px;font-family:'JetBrains Mono',monospace;font-size:.56rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-muted)}
  .replay{position:absolute;top:12px;right:16px;border:1px solid var(--border);background:transparent;color:var(--ink-muted);border-radius:999px;padding:5px 12px;font-family:'JetBrains Mono',monospace;font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer}
  .tag{font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:26px}

  .cd{--num:clamp(1.8rem,6vw,2.8rem);display:inline-block}
  .grid{display:inline-flex;align-items:flex-start;gap:clamp(12px,3vw,24px)}
  .u{display:flex;flex-direction:column;align-items:center;gap:7px;min-width:2.4ch}
  .num{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:var(--num);line-height:1;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
  .lab{font-family:'JetBrains Mono',monospace;font-size:.56rem;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-muted)}
  .sep{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:var(--num);line-height:1;color:var(--ink-muted);opacity:.45}
  .num.pulse{animation:pul .5s cubic-bezier(.2,.8,.2,1)}
  @keyframes pul{0%{transform:translateY(-3px);opacity:.4}100%{transform:none;opacity:1}}
  .cd svg{display:block;width:100%;height:6px;margin-top:16px;overflow:visible}
  .cd path{fill:none;stroke:var(--stroke);stroke-width:1.6;stroke-linecap:round;stroke-dasharray:1;stroke-dashoffset:1}

  /* B · wipe vertical (cada número "preenche" de baixo pra cima) */
  .vB .u .num{clip-path:inset(0 0 100% 0)}
  .vB.run .u:nth-child(1) .num{animation:wipe .5s ease .05s forwards}
  .vB.run .grid .u:nth-child(1) .num{} /* noop */
  .vB.run .num{animation:wipe .55s cubic-bezier(.2,.8,.2,1) forwards}
  .vB.run .u:nth-child(1){}
  .vB.run .grid>*:nth-child(1) .num{animation-delay:.05s}
  .vB.run .grid>*:nth-child(3) .num{animation-delay:.18s}
  .vB.run .grid>*:nth-child(5) .num{animation-delay:.31s}
  .vB.run .grid>*:nth-child(7) .num{animation-delay:.44s}
  .vB.run path{animation:draw 1.7s cubic-bezier(.65,0,.35,1) forwards}
  @keyframes wipe{to{clip-path:inset(0 0 0% 0)}}
  @keyframes draw{to{stroke-dashoffset:0}}

  /* C · a linha desenha e REVELA tudo da esquerda pra direita */
  .vC .reveal{clip-path:inset(0 100% 0 0)}
  .vC.run .reveal{animation:sweep 1.7s cubic-bezier(.65,0,.35,1) forwards}
  .vC.run path{animation:draw 1.7s cubic-bezier(.65,0,.35,1) forwards}
  @keyframes sweep{to{clip-path:inset(0 0% 0 0)}}

  /* A · count-up (odômetro) — controlado via JS */
  .vA .u,.vA .sep{opacity:0;animation:up .6s cubic-bezier(.2,.8,.2,1) forwards}
  .vA.run .grid>*:nth-child(1){animation-delay:.05s}.vA.run .grid>*:nth-child(2){animation-delay:.1s}
  .vA.run .grid>*:nth-child(3){animation-delay:.15s}.vA.run .grid>*:nth-child(4){animation-delay:.2s}
  .vA.run .grid>*:nth-child(5){animation-delay:.25s}.vA.run .grid>*:nth-child(6){animation-delay:.3s}
  .vA.run .grid>*:nth-child(7){animation-delay:.35s}
  .vA.run path{animation:draw 1.7s cubic-bezier(.65,0,.35,1) forwards}
  @keyframes up{to{opacity:1}}
</style>
</head>
<body>
  <div class="top"><h1>Countdown · 3 estilos de entrada</h1><button class="toggle" id="toggle">🌙 / ☀️ tema</button></div>

  <div class="card">
    <div class="vlabel">A · count-up (odômetro)</div><button class="replay" data-v="A">↻ replay</button>
    <div class="tag">North America · faltam</div>
    <div class="cd vA" data-mode="A"></div>
  </div>
  <div class="card">
    <div class="vlabel">B · wipe vertical (preenche)</div><button class="replay" data-v="B">↻ replay</button>
    <div class="tag">North America · faltam</div>
    <div class="cd vB" data-mode="B"></div>
  </div>
  <div class="card">
    <div class="vlabel">C · linha desenha e revela →</div><button class="replay" data-v="C">↻ replay</button>
    <div class="tag">North America · faltam</div>
    <div class="cd vC" data-mode="C"></div>
  </div>

<script>
  var TARGET=new Date('2026-12-20T20:00:00').getTime();
  function pad(n){return n<10?'0'+n:''+n;}
  function parts(){var diff=Math.max(0,TARGET-Date.now());var s=Math.floor(diff/1000);var d=Math.floor(s/86400);s-=d*86400;var h=Math.floor(s/3600);s-=h*3600;var m=Math.floor(s/60);s-=m*60;return{d:d,h:h,m:m,s:s};}

  function build(el){
    var inner='<div class="grid">'+
      '<div class="u"><span class="num" data-u="d">0</span><span class="lab">dias</span></div><span class="sep">:</span>'+
      '<div class="u"><span class="num" data-u="h">00</span><span class="lab">horas</span></div><span class="sep">:</span>'+
      '<div class="u"><span class="num" data-u="m">00</span><span class="lab">min</span></div><span class="sep">:</span>'+
      '<div class="u"><span class="num" data-u="s">00</span><span class="lab">seg</span></div></div>'+
      '<svg viewBox="0 0 100 4" preserveAspectRatio="none"><path d="M0 2 H100" pathLength="1"/></svg>';
    if(el.dataset.mode==='C'){ el.innerHTML='<div class="reveal">'+inner.replace('<svg','</div><svg').replace('</div><svg','</div><svg')+'';
      // wrap só o grid no reveal:
      el.innerHTML='<div class="reveal"><div class="grid">'+
        '<div class="u"><span class="num" data-u="d">0</span><span class="lab">dias</span></div><span class="sep">:</span>'+
        '<div class="u"><span class="num" data-u="h">00</span><span class="lab">horas</span></div><span class="sep">:</span>'+
        '<div class="u"><span class="num" data-u="m">00</span><span class="lab">min</span></div><span class="sep">:</span>'+
        '<div class="u"><span class="num" data-u="s">00</span><span class="lab">seg</span></div></div></div>'+
        '<svg viewBox="0 0 100 4" preserveAspectRatio="none"><path d="M0 2 H100" pathLength="1"/></svg>';
    } else { el.innerHTML=inner; }
  }
  function setLive(el){
    var p=parts();
    el.querySelector('[data-u=d]').textContent=p.d;
    el.querySelector('[data-u=h]').textContent=pad(p.h);
    el.querySelector('[data-u=m]').textContent=pad(p.m);
    var sEl=el.querySelector('[data-u=s]');var ss=pad(p.s);
    if(sEl.textContent!==ss){sEl.textContent=ss;sEl.classList.remove('pulse');void sEl.offsetWidth;sEl.classList.add('pulse');}
  }
  function countUp(el,done){
    var p0=parts(),t0=performance.now(),DUR=1700;
    var nD=el.querySelector('[data-u=d]'),nH=el.querySelector('[data-u=h]'),nM=el.querySelector('[data-u=m]'),nS=el.querySelector('[data-u=s]');
    requestAnimationFrame(function step(now){
      var k=Math.min(1,(now-t0)/DUR),e=1-Math.pow(1-k,3);
      nD.textContent=Math.round(p0.d*e);nH.textContent=pad(Math.round(p0.h*e));
      nM.textContent=pad(Math.round(p0.m*e));nS.textContent=pad(Math.round(p0.s*e));
      if(k<1)requestAnimationFrame(step);else done&&done();
    });
  }
  var timers={};
  function play(el){
    var v=el.dataset.mode;
    if(timers[v])clearInterval(timers[v]);
    build(el);
    // reinicia animações CSS
    el.classList.remove('run');void el.offsetWidth;el.classList.add('run');
    if(v==='A'){ countUp(el,function(){setLive(el);timers[v]=setInterval(function(){setLive(el)},1000);}); }
    else { setLive(el); timers[v]=setInterval(function(){setLive(el)},1000); }
  }
  document.querySelectorAll('.cd').forEach(play);
  document.querySelectorAll('.replay').forEach(function(b){b.addEventListener('click',function(){play(document.querySelector('.cd[data-mode='+b.dataset.v+']'));});});
  document.getElementById('toggle').addEventListener('click',function(){document.body.classList.toggle('dark');});
</script>
</body>
</html>
